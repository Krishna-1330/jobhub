{% extends "base.html" %}
{% block title %}Recruiter Registration – PlaceHub{% endblock %}
{% block content %}
<div class="container-sm">
  <div class="form-card">
    <h2>🏢 Recruiter Registration</h2>
    <form method="POST" action="{{ url_for('recruiter_register') }}">
      <div class="form-row">
        <div class="form-group">
          <label>Full Name</label>
          <input type="text" name="name" class="form-control" placeholder="Jane Smith" required/>
        </div>
        <div class="form-group">
          <label>Email</label>
          <input type="email" name="email" class="form-control" placeholder="jane@company.com" required/>
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>Password</label>
          <input type="password" name="password" class="form-control" placeholder="••••••••" required minlength="6"/>
        </div>
        <div class="form-group">
          <label>Phone</label>
          <input type="text" name="phone" class="form-control" placeholder="+91 9876543210" required/>
        </div>
      </div>
      <div class="form-group">
        <label>Company Name</label>
        <input type="text" name="company" class="form-control" placeholder="Acme Corp Pvt. Ltd." required/>
      </div>
      <button type="submit" class="btn btn-success btn-full">Create Account</button>
    </form>
    <div class="form-footer">
      Already registered? <a href="{{ url_for('recruiter_login') }}">Login here</a>
    </div>
  </div>
</div>
{% endblock %}
