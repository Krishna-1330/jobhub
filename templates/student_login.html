{% extends "base.html" %}
{% block title %}Student Login – PlaceHub{% endblock %}
{% block content %}
<div class="container-sm">
  <div class="form-card">
    <h2>🎓 Student Login</h2>
    <form method="POST" action="{{ url_for('student_login') }}">
      <div class="form-group">
        <label>Email</label>
        <input type="email" name="email" class="form-control" placeholder="john@college.edu" required/>
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" name="password" class="form-control" placeholder="••••••••" required/>
      </div>
      <button type="submit" class="btn btn-primary btn-full">Login</button>
    </form>
    <div class="form-footer">
      New student? <a href="{{ url_for('student_register') }}">Register here</a>
    </div>
  </div>
</div>
{% endblock %}
