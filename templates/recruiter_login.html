{% extends "base.html" %}
{% block title %}Recruiter Login – PlaceHub{% endblock %}
{% block content %}
<div class="container-sm">
  <div class="form-card">
    <h2>🏢 Recruiter Login</h2>
    <form method="POST" action="{{ url_for('recruiter_login') }}">
      <div class="form-group">
        <label>Email</label>
        <input type="email" name="email" class="form-control" placeholder="jane@company.com" required/>
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" name="password" class="form-control" placeholder="••••••••" required/>
      </div>
      <button type="submit" class="btn btn-success btn-full">Login</button>
    </form>
    <div class="form-footer">
      New recruiter? <a href="{{ url_for('recruiter_register') }}">Register here</a>
    </div>
  </div>
</div>
{% endblock %}
