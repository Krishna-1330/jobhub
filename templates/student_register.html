{% extends "base.html" %}
{% block title %}Student Registration – PlaceHub{% endblock %}
{% block content %}
<div class="container-sm">
  <div class="form-card">
    <h2>🎓 Student Registration</h2>
    <form method="POST" action="{{ url_for('student_register') }}">
      <div class="form-row">
        <div class="form-group">
          <label>Full Name</label>
          <input type="text" name="name" class="form-control" placeholder="John Doe" required/>
        </div>
        <div class="form-group">
          <label>Email</label>
          <input type="email" name="email" class="form-control" placeholder="john@college.edu" required/>
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>Password</label>
          <input type="password" name="password" class="form-control" placeholder="••••••••" required minlength="6"/>
        </div>
        <div class="form-group">
          <label>Phone</label>
          <input type="text" name="phone" class="form-control" placeholder="+91 9876543210" required/>
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>Branch / Department</label>
          <input type="text" name="branch" class="form-control" placeholder="Computer Science" required/>
        </div>
        <div class="form-group">
          <label>CGPA</label>
          <input type="number" name="cgpa" class="form-control" step="0.01" min="0" max="10" placeholder="8.5" required/>
        </div>
      </div>
      <button type="submit" class="btn btn-primary btn-full">Create Account</button>
    </form>
    <div class="form-footer">
      Already registered? <a href="{{ url_for('student_login') }}">Login here</a>
    </div>
  </div>
</div>
{% endblock %}
